kind = "web"
previewPath = "/"
title = "ASSAY"
version = "1.0.0"
id = "artifacts/assay-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19512
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/assay-app run dev"

[services.env]
PORT = "19512"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/assay-app", "run", "build"]
publicDir = "artifacts/assay-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
